<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البيانات الموحدة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .user-header { background: #eef2f7; padding: 25px; border-radius: 15px; border-right: 10px solid #1a2a6c; margin-bottom: 30px; }
        .info-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .label { color: #777; font-size: 0.85rem; }
        .value { color: #1a2a6c; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="user-header">
            <div class="row">
                <div class="col-md-4">
                    <div class="label">الاسم الرباعي</div>
                    <div class="value">{{ user.name }}</div>
                </div>
                <div class="col-md-4">
                    <div class="label">رقم التسجيل</div>
                    <div class="value">{{ user.reg }}</div>
                </div>
                <div class="col-md-4">
                    <div class="label">رقم الهوية</div>
                    <div class="value">{{ user.id }}</div>
                </div>
            </div>
        </div>

        <h4 class="mb-4">البيانات الموحدة المستخرجة:</h4>
        
        <div class="info-card">
            <div class="label">الايبان الموحد</div>
            <div class="value text-primary">{{ user.iban }}</div>
        </div>

        <div class="info-card">
            <div class="label">رقم الحساب الموحد</div>
            <div class="value text-success">{{ user.acc }}</div>
        </div>

        <div class="mt-5 text-center">
            <a href="/" class="btn btn-secondary">العودة للرئيسية</a>
        </div>
    </div>
</body>
</html>
