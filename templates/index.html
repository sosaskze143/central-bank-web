<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البنك المركزي - النظام الموحد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-blue: #1a2a6c; --gold: #b2945e; }
        body { background: #f4f7f9; font-family: 'Segoe UI', sans-serif; }
        .header { background: var(--main-blue); color: white; padding: 40px 0; border-bottom: 5px solid var(--gold); }
        .card-custom { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: -40px; background: white; }
        .btn-main { background: var(--main-blue); color: white; border: none; padding: 12px; transition: 0.3s; }
        .btn-main:hover { background: #0d1a45; color: white; }
        
        /* تصميم دائرة التحميل */
        #loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--main-blue);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="spinner"></div>
        <p class="mt-3 fw-bold text-primary">جاري معالجة البيانات وبحث النظام...</p>
    </div>

    <div class="header text-center">
        <h1>البنك المركزي</h1>
        <p>البيانات الموحدة للعمليات المالية</p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-custom p-5">
                    <form id="uploadForm" action="/process" method="POST" enctype="multipart/form-data">
                        <div class="mb-4 text-center">
                            <label class="form-label fw-bold mb-3">ارفع الملف الخاص بالبيانات</label>
                            <input type="file" name="file" class="form-control" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-main btn-lg">ارفع الملف</button>
                            <button type="button" class="btn btn-outline-secondary">ابحث</button>
                        </div>
                    </form>

                    {% with messages = get_flashed_messages() %}
                      {% if messages %}
                        <div class="alert alert-danger mt-4 text-center">{{ messages[0] }}</div>
                      {% endif %}
                    {% endwith %}
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = function() {
            document.getElementById('loader-overlay').style.display = 'flex';
        };
    </script>
</body>
</html>
